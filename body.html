<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>신체 기록 - MN Health</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif;background:#f9fafb;color:#191f28;min-height:100vh}
    header{background:#fff;border-bottom:1px solid #f2f4f6;padding:0 20px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
    header a{color:#191f28;text-decoration:none;display:flex;align-items:center}
    header h2{font-size:17px;font-weight:700}
    main{max-width:480px;margin:0 auto;padding:24px 20px 100px}
    .card{background:#fff;border-radius:16px;padding:20px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
    .card-label{font-size:12px;color:#6b7684;font-weight:500;margin-bottom:8px}
    .card-value{font-size:32px;font-weight:700;letter-spacing:-1px}
    .card-unit{font-size:16px;color:#6b7684;margin-left:4px}
    .badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:13px;font-weight:600;margin-top:10px}
    .b-normal{background:#e8f3ff;color:#3182f6}
    .b-warning{background:#fff3e0;color:#ff9800}
    .b-danger{background:#ffeaea;color:#f44336}
    .b-none{background:#f2f4f6;color:#b0b8c1}
    .bmi-wrap{background:#f2f4f6;border-radius:100px;height:10px;margin:16px 0 8px;position:relative}
    .bmi-segs{position:absolute;top:0;left:0;right:0;bottom:0;border-radius:100px;overflow:hidden;display:flex}
    .s1{background:#90caf9;flex:35}.s2{background:#66bb6a;flex:22.5}.s3{background:#ffa726;flex:10}.s4{background:#ef5350;flex:32.5}
    .bmi-dot{position:absolute;top:-4px;width:18px;height:18px;background:#fff;border:3px solid #3182f6;border-radius:50%;transform:translateX(-50%);box-shadow:0 2px 6px rgba(49,130,246,0.4);transition:left 0.6s}
    .bmi-labs{display:flex;justify-content:space-between;margin-top:6px}
    .bmi-labs span{font-size:11px;color:#b0b8c1;text-align:center}
    .info-box{background:#f2f4f6;border-radius:12px;padding:12px 14px;margin-top:12px;font-size:13px;color:#6b7684;line-height:1.5}
    label{font-size:13px;color:#6b7684;font-weight:500;display:block;margin-bottom:6px}
    input[type=date],input[type=number]{width:100%;padding:14px 16px;border:1.5px solid #f2f4f6;border-radius:12px;font-size:16px;color:#191f28;background:#f9fafb;outline:none;font-family:inherit;margin-bottom:14px}
    input:focus{border-color:#3182f6;background:#fff}
    .btn{width:100%;background:#3182f6;color:#fff;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit}
    .btn:active{background:#1a6fe0}
    canvas{display:block}
    .h-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #f2f4f6}
    .h-row:last-child{border-bottom:none}
    .h-date{font-size:13px;color:#6b7684}
    .h-vals{display:flex;gap:12px;align-items:center;flex:1;justify-content:flex-end;margin-right:12px}
    .h-w{font-size:15px;font-weight:600}
    .h-bmi{font-size:13px;color:#6b7684}
    .del-btn{background:none;border:none;color:#b0b8c1;cursor:pointer;padding:4px;display:flex;align-items:center}
    nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #f2f4f6;display:flex;height:64px;z-index:100}
    nav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;text-decoration:none;color:#b0b8c1;font-size:10px;font-weight:500}
    nav a.active{color:#3182f6}
  </style>
</head>
<body>
<header>
  <a href="index.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></a>
  <h2>신체 기록</h2>
</header>
<main>
  <div class="card">
    <div class="card-label">현재 BMI</div>
    <div><span class="card-value" id="bmiVal">--</span><span class="card-unit">kg/m²</span></div>
    <div class="bmi-wrap">
      <div class="bmi-segs"><div class="s1"></div><div class="s2"></div><div class="s3"></div><div class="s4"></div></div>
      <div class="bmi-dot" id="bmiDot" style="left:50%"></div>
    </div>
    <div class="bmi-labs"><span>저체중<br>&lt;18.5</span><span>정상<br>18.5~23</span><span>과체중<br>23~25</span><span>비만<br>≥25</span></div>
    <span class="badge b-none" id="bmiBadge">정보 없음</span>
    <div class="info-box" id="bmiInfo" style="display:none"></div>
  </div>

  <div class="card">
    <div class="card-label" style="margin-bottom:16px">기록 추가</div>
    <label>날짜</label>
    <input type="date" id="iDate"/>
    <label>키 (cm)</label>
    <input type="number" id="iHeight" placeholder="170" step="0.1"/>
    <label>체중 (kg)</label>
    <input type="number" id="iWeight" placeholder="65.0" step="0.1"/>
    <button class="btn" id="saveBtn">저장하기</button>
  </div>

  <div class="card">
    <div class="card-label">체중 변화</div>
    <div style="overflow-x:auto"><canvas id="chart" height="180"></canvas></div>
  </div>

  <div class="card">
    <div class="card-label" style="margin-bottom:12px">기록 내역</div>
    <div id="histList"><div style="text-align:center;padding:20px 0;color:#b0b8c1;font-size:14px">기록이 없어요</div></div>
  </div>
</main>
<nav>
  <a href="index.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>홈</a>
  <a href="body.html" class="active"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>신체</a>
  <a href="exercise.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>운동</a>
  <a href="settings.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>설정</a>
</nav>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, getDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const app = initializeApp({
    apiKey:"AIzaSyBDIgsg99fxj2RFeEeFVD92mNltAweDpd8",
    authDomain:"mn-health.firebaseapp.com",
    projectId:"mn-health",
    storageBucket:"mn-health.firebasestorage.app",
    messagingSenderId:"442489563296",
    appId:"1:442489563296:web:c2a044ee36b1a1c59641c5"
  });
  const auth = getAuth(app);
  const db = getFirestore(app);
  let uid, recs=[], profile={};

  const today = new Date().toISOString().slice(0,10);
  document.getElementById('iDate').value = today;
  document.getElementById('iDate').max = today;

  // ── 연령 계산 ──
  function getAge(birthStr) {
    if(!birthStr) return null;
    const birth = new Date(birthStr), now = new Date();
    let age = now.getFullYear() - birth.getFullYear();
    if(now.getMonth() < birth.getMonth() || (now.getMonth()===birth.getMonth() && now.getDate()<birth.getDate())) age--;
    return age;
  }

  // ── BMI 판정 (연령/성별 반영) ──
  // 소아청소년(2~18세): 질병관리청 2017 소아청소년 성장도표 BMI 백분위수 기준
  // 성인(18세 이상): 대한비만학회 아시아태평양 기준
  function bmiInfo(bmi, age, gender) {
    if(age !== null && age < 18 && age >= 2) {
      // 소아청소년 기준: BMI 백분위수 (5th/85th/95th 근사값)
      // 성별/연령별 정확한 백분위 테이블 대신 대표 근사값 사용
      const cutoffs = getChildCutoffs(age, gender);
      if(bmi < cutoffs.p5)  return {l:'저체중 (5th 미만)',   c:'b-warning', info:`${age}세 ${gender==='male'?'남자':'여자'} 기준 하위 5% 미만입니다.`};
      if(bmi < cutoffs.p85) return {l:'정상',                c:'b-normal',  info:`${age}세 ${gender==='male'?'남자':'여자'} 기준 정상 범위(5th~85th)입니다.`};
      if(bmi < cutoffs.p95) return {l:'과체중 (85th~95th)', c:'b-warning', info:`${age}세 ${gender==='male'?'남자':'여자'} 기준 과체중 범위입니다.`};
      return              {l:'비만 (95th 이상)',   c:'b-danger',  info:`${age}세 ${gender==='male'?'남자':'여자'} 기준 비만 범위입니다.`};
    }
    // 성인 기준
    if(bmi < 18.5) return {l:'저체중', c:'b-warning', info:'대한비만학회 아시아태평양 기준: BMI 18.5 미만'};
    if(bmi < 23)   return {l:'정상',   c:'b-normal',  info:'대한비만학회 아시아태평양 기준: BMI 18.5~22.9'};
    if(bmi < 25)   return {l:'과체중', c:'b-warning', info:'대한비만학회 아시아태평양 기준: BMI 23.0~24.9'};
    return               {l:'비만',   c:'b-danger',  info:'대한비만학회 아시아태평양 기준: BMI 25.0 이상'};
  }

  // 질병관리청 2017 소아청소년 성장도표 BMI 백분위 근사값 (5th / 85th / 95th)
  function getChildCutoffs(age, gender) {
    const male = {
      2:{p5:14.3,p85:17.0,p95:18.0}, 3:{p5:13.9,p85:16.6,p95:17.6}, 4:{p5:13.6,p85:16.3,p95:17.3},
      5:{p5:13.4,p85:16.2,p95:17.4}, 6:{p5:13.3,p85:16.3,p95:17.8}, 7:{p5:13.4,p85:16.8,p95:18.5},
      8:{p5:13.6,p85:17.5,p95:19.5}, 9:{p5:13.9,p85:18.2,p95:20.5},10:{p5:14.2,p85:19.0,p95:21.5},
      11:{p5:14.6,p85:19.8,p95:22.5},12:{p5:15.0,p85:20.6,p95:23.3},13:{p5:15.5,p85:21.3,p95:24.0},
      14:{p5:16.0,p85:22.0,p95:24.7},15:{p5:16.5,p85:22.6,p95:25.2},16:{p5:17.0,p85:23.1,p95:25.6},
      17:{p5:17.4,p85:23.5,p95:25.9}
    };
    const female = {
      2:{p5:14.0,p85:17.0,p95:18.1}, 3:{p5:13.6,p85:16.6,p95:17.7}, 4:{p5:13.3,p85:16.3,p95:17.5},
      5:{p5:13.1,p85:16.2,p95:17.7}, 6:{p5:13.0,p85:16.4,p95:18.2}, 7:{p5:13.1,p85:17.0,p95:19.0},
      8:{p5:13.3,p85:17.7,p95:20.0}, 9:{p5:13.6,p85:18.5,p95:21.1},10:{p5:14.0,p85:19.3,p95:22.1},
      11:{p5:14.5,p85:20.2,p95:23.1},12:{p5:15.1,p85:21.1,p95:24.0},13:{p5:15.7,p85:21.9,p95:24.7},
      14:{p5:16.2,p85:22.5,p95:25.2},15:{p5:16.6,p85:23.0,p95:25.6},16:{p5:17.0,p85:23.3,p95:25.9},
      17:{p5:17.3,p85:23.6,p95:26.1}
    };
    const tbl = gender==='female' ? female : male;
    const a = Math.min(Math.max(Math.floor(age), 2), 17);
    return tbl[a] || {p5:14.0, p85:18.5, p95:23.0};
  }

  function col(){ return collection(db, `users/${uid}/body_records`); }

  onAuthStateChanged(auth, async user => {
    if(!user){ location.href='index.html'; return; }
    uid = user.uid;
    // 프로필(생년월일/성별) 로드
    try {
      const snap = await getDoc(doc(db, `users/${uid}/profile`, 'info'));
      if(snap.exists()) profile = snap.data();
    } catch(e){}
    await load();
  });

  async function load(){
    const snap = await getDocs(query(col(), orderBy('date')));
    recs = snap.docs.map(d=>({...d.data(), _id:d.id}));
    renderBMI(); renderHist(); renderChart();
    if(recs.length){ const l=recs[recs.length-1]; document.getElementById('iHeight').value=l.height; document.getElementById('iWeight').value=l.weight; }
  }

  function renderBMI(){
    if(!recs.length) return;
    const b = recs[recs.length-1].bmi;
    const age = getAge(profile.birth);
    const gender = profile.gender || 'male';
    document.getElementById('bmiVal').textContent = b.toFixed(1);
    const {l, c, info} = bmiInfo(b, age, gender);
    const badge = document.getElementById('bmiBadge');
    badge.textContent = l; badge.className = 'badge ' + c;
    document.getElementById('bmiDot').style.left = Math.min(Math.max((b-15)/20*100, 2), 98) + '%';
    const infoBox = document.getElementById('bmiInfo');
    if(info){ infoBox.style.display='block'; infoBox.textContent = info; }

    // 프로필 미설정 안내
    if(age === null){
      infoBox.style.display='block';
      infoBox.textContent='설정에서 생년월일과 성별을 입력하면 연령에 맞는 정확한 BMI 기준이 적용돼요.';
    }
  }

  document.getElementById('saveBtn').onclick = async() => {
    const dateVal = document.getElementById('iDate').value;
    const h = parseFloat(document.getElementById('iHeight').value);
    const w = parseFloat(document.getElementById('iWeight').value);
    if(!dateVal){ alert('날짜를 선택해 주세요'); return; }
    if(!h||!w||h<100||h>250||w<20||w>300){ alert('키와 체중을 올바르게 입력해 주세요'); return; }
    const bmi = parseFloat((w/((h/100)**2)).toFixed(2));
    const exist = recs.find(r=>r.date===dateVal);
    if(exist) await deleteDoc(doc(db, `users/${uid}/body_records`, exist._id));
    await addDoc(col(), {date:dateVal, height:h, weight:w, bmi});
    await load();
  };

  window.delRec = async(id) => {
    if(!confirm('이 기록을 삭제할까요?')) return;
    await deleteDoc(doc(db, `users/${uid}/body_records`, id));
    await load();
  };

  function renderHist(){
    const el = document.getElementById('histList');
    const age = getAge(profile.birth);
    const gender = profile.gender || 'male';
    if(!recs.length){ el.innerHTML='<div style="text-align:center;padding:20px 0;color:#b0b8c1;font-size:14px">기록이 없어요</div>'; return; }
    el.innerHTML = [...recs].reverse().map(r => {
      const {l} = bmiInfo(r.bmi, age, gender);
      return `<div class="h-row"><span class="h-date">${r.date}</span><div class="h-vals"><span class="h-w">${r.weight} kg</span><span class="h-bmi">BMI ${r.bmi} · ${l}</span></div><button class="del-btn" onclick="delRec('${r._id}')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg></button></div>`;
    }).join('');
  }

  function renderChart(){
    const canvas = document.getElementById('chart');
    const ctx = canvas.getContext('2d');
    const W = canvas.parentElement.clientWidth; canvas.width=W; canvas.height=180;
    ctx.clearRect(0,0,W,180);
    if(recs.length<2){ ctx.fillStyle='#b0b8c1'; ctx.font='13px -apple-system,sans-serif'; ctx.textAlign='center'; ctx.fillText('기록이 2개 이상이면 그래프가 표시돼요',W/2,90); return; }
    const ws=recs.map(r=>r.weight), minW=Math.min(...ws)-2, maxW=Math.max(...ws)+2;
    const pL=40,pR=16,pT=16,pB=36,gW=W-pL-pR,gH=180-pT-pB;
    const xOf=i=>pL+(i/(recs.length-1))*gW, yOf=w=>pT+(1-(w-minW)/(maxW-minW))*gH;
    ctx.strokeStyle='#f2f4f6'; ctx.lineWidth=1;
    for(let i=0;i<=4;i++){ const y=pT+(i/4)*gH; ctx.beginPath(); ctx.moveTo(pL,y); ctx.lineTo(W-pR,y); ctx.stroke(); ctx.fillStyle='#b0b8c1'; ctx.font='11px -apple-system,sans-serif'; ctx.textAlign='right'; ctx.fillText((maxW-(i/4)*(maxW-minW)).toFixed(1),pL-4,y+4); }
    ctx.beginPath(); ctx.strokeStyle='#3182f6'; ctx.lineWidth=2.5; ctx.lineJoin='round';
    recs.forEach((r,i)=>i===0?ctx.moveTo(xOf(i),yOf(r.weight)):ctx.lineTo(xOf(i),yOf(r.weight))); ctx.stroke();
    recs.forEach((r,i)=>{ ctx.beginPath(); ctx.arc(xOf(i),yOf(r.weight),4,0,Math.PI*2); ctx.fillStyle='#3182f6'; ctx.fill(); ctx.beginPath(); ctx.arc(xOf(i),yOf(r.weight),2,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill(); });
    ctx.fillStyle='#b0b8c1'; ctx.font='11px -apple-system,sans-serif'; ctx.textAlign='center';
    ctx.fillText(recs[0].date.slice(5),xOf(0),174); ctx.fillText(recs[recs.length-1].date.slice(5),xOf(recs.length-1),174);
  }
</script>
</body>
</html>
