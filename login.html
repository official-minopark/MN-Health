<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 - MN Health</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
      background: #fff;
      color: #191f28;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .login-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px 32px;
      max-width: 400px;
      margin: 0 auto;
      width: 100%;
    }
    .logo-area {
      text-align: center;
      margin-bottom: 48px;
    }
    .logo {
      font-size: 32px;
      font-weight: 800;
      color: #3182f6;
      letter-spacing: -1.5px;
    }
    .logo-sub {
      font-size: 15px;
      color: #6b7684;
      margin-top: 6px;
    }

    .form-area { width: 100%; }
    .form-row { margin-bottom: 14px; }
    .form-row label { font-size: 13px; color: #6b7684; font-weight: 500; display: block; margin-bottom: 6px; }
    .form-row input {
      width: 100%;
      padding: 15px 16px;
      border: 1.5px solid #f2f4f6;
      border-radius: 14px;
      font-size: 16px;
      color: #191f28;
      background: #f9fafb;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    .form-row input:focus { border-color: #3182f6; background: #fff; }
    .form-row input.error { border-color: #f44336; }

    .error-msg {
      font-size: 12px;
      color: #f44336;
      margin-top: 6px;
      display: none;
    }
    .error-msg.show { display: block; }

    .btn-primary {
      width: 100%;
      background: #3182f6;
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .btn-primary:active { background: #1a6fe0; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
    }
    .divider-line { flex: 1; height: 1px; background: #f2f4f6; }
    .divider-text { font-size: 13px; color: #b0b8c1; white-space: nowrap; }

    .btn-google {
      width: 100%;
      background: #fff;
      color: #191f28;
      border: 1.5px solid #f2f4f6;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: border-color 0.15s;
    }
    .btn-google:hover { border-color: #c8d6e8; }

    .signup-link {
      text-align: center;
      margin-top: 28px;
      font-size: 14px;
      color: #6b7684;
    }
    .signup-link a { color: #3182f6; text-decoration: none; font-weight: 600; }

    .skip-link {
      text-align: center;
      margin-top: 16px;
    }
    .skip-link button {
      background: none;
      border: none;
      color: #b0b8c1;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      text-decoration: underline;
    }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="logo-area">
    <div class="logo">MN Health</div>
    <div class="logo-sub">건강한 하루를 기록하세요</div>
  </div>

  <div class="form-area">
    <div class="form-row">
      <label>이메일</label>
      <input type="email" id="inputEmail" placeholder="email@example.com" autocomplete="email" />
    </div>
    <div class="form-row">
      <label>비밀번호</label>
      <input type="password" id="inputPw" placeholder="비밀번호를 입력하세요" autocomplete="current-password" />
      <div class="error-msg" id="errorMsg">이메일 또는 비밀번호가 올바르지 않아요</div>
    </div>

    <button class="btn-primary" onclick="handleLogin()">로그인</button>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">또는</span>
      <div class="divider-line"></div>
    </div>

    <button class="btn-google" onclick="handleGoogleLogin()">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Google로 계속하기
    </button>

    <div class="signup-link">
      계정이 없으신가요? <a href="#" onclick="showSignup()">회원가입</a>
    </div>

    <div class="skip-link">
      <button onclick="skipLogin()">로그인 없이 사용하기</button>
    </div>
  </div>
</div>

<script>
  // Firebase 로그인 - config 나중에 추가
  // import { initializeApp } from "firebase/app";
  // import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "firebase/auth";

  function handleLogin() {
    const email = document.getElementById('inputEmail').value.trim();
    const pw = document.getElementById('inputPw').value;
    const errMsg = document.getElementById('errorMsg');

    if (!email || !pw) {
      errMsg.classList.add('show');
      return;
    }

    // Firebase 연동 후 활성화
    // signInWithEmailAndPassword(auth, email, pw)
    //   .then(() => location.href = 'index.html')
    //   .catch(() => errMsg.classList.add('show'));

    // 임시: 로컬 로그인
    localStorage.setItem('mn_logged_in', '1');
    location.href = 'index.html';
  }

  function handleGoogleLogin() {
    // Firebase Google 로그인 연동 후 활성화
    // const provider = new GoogleAuthProvider();
    // signInWithPopup(auth, provider)
    //   .then(() => location.href = 'index.html')
    //   .catch(err => console.error(err));

    localStorage.setItem('mn_logged_in', '1');
    location.href = 'index.html';
  }

  function skipLogin() {
    localStorage.setItem('mn_logged_in', 'guest');
    location.href = 'index.html';
  }

  function showSignup() {
    alert('회원가입 기능은 준비 중이에요.');
  }

  // Enter 키 로그인
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });

  // 이미 로그인 상태면 홈으로
  if (localStorage.getItem('mn_logged_in')) {
    location.href = 'index.html';
  }
</script>
</body>
</html>
