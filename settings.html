<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MN Health - 설정</title>
<style>
:root {
  --bg: #f5f6f8; --card: #ffffff; --primary: #3182f6;
  --text: #191f28; --text-sub: #8b95a1; --border: #f2f4f6; --red: #f04452;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
  min-height: 100vh; display: flex; flex-direction: column; padding-bottom: 76px;
}
.app-header { padding: 20px 20px 8px; font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
.container { flex: 1; width: 100%; max-width: 480px; margin: 0 auto; padding: 8px 20px; }
.card { background: var(--card); border-radius: 16px; margin-bottom: 12px; overflow: hidden; }
.menu-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; font-size: 15px; font-weight: 600;
  border-bottom: 1px solid var(--border); cursor: pointer;
}
.menu-item:last-child { border-bottom: none; }
.menu-item .arrow { color: var(--text-sub); font-size: 14px; }
.menu-item.danger { color: var(--red); }
.section-label { font-size: 13px; color: var(--text-sub); font-weight: 700; margin: 4px 4px 8px; }
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; display: flex;
  background: var(--card); border-top: 1px solid var(--border);
  max-width: 480px; margin: 0 auto; padding-bottom: env(safe-area-inset-bottom);
}
.bottom-nav a {
  flex: 1; text-align: center; padding: 10px 4px; text-decoration: none;
  color: var(--text-sub); font-size: 11px; font-weight: 600;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.bottom-nav a svg { display: block; }
.bottom-nav a.active { color: var(--primary); }
</style>
</head>
<body>

<div class="app-header">설정</div>

<div class="container">
  <div class="section-label">AI 설정</div>
  <div class="card" style="padding: 16px 20px;">
    <div style="font-size: 13px; color: var(--text-sub); font-weight: 600; margin-bottom: 8px;">Claude API 키</div>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-..." style="width:100%; background: var(--bg); border: none; border-radius: 12px; padding: 14px; font-size: 15px; color: var(--text); margin-bottom: 10px; font-family: inherit; box-sizing: border-box;">
    <button id="saveKeyBtn" style="width:100%; background: var(--primary); color: #fff; border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer;">저장</button>
    <p id="keyStatus" style="font-size: 12px; color: var(--text-sub); margin-top: 8px;"></p>
    <p style="font-size: 12px; color: var(--text-sub); margin-top: 8px; line-height: 1.6;">
      운동/식단 기록의 칼로리를 자동 계산하려면 API 키가 필요해요. 키는 이 기기의 브라우저에만 저장돼요.
    </p>
  </div>

  <div class="section-label">계정</div>
  <div class="card">
    <div class="menu-item">
      <span>이메일</span>
      <span class="arrow" id="userEmail">-</span>
    </div>
    <div class="menu-item danger" id="logoutBtn">
      <span>로그아웃</span>
      <span class="arrow">›</span>
    </div>
  </div>

  <div class="section-label">데이터</div>
  <div class="card">
    <div class="menu-item" id="exportBtn">
      <span>기록 내보내기 (JSON)</span>
      <span class="arrow">›</span>
    </div>
    <div class="menu-item danger" id="resetBtn">
      <span>전체 기록 삭제</span>
      <span class="arrow">›</span>
    </div>
  </div>

  <div class="section-label">정보</div>
  <div class="card">
    <div class="menu-item">
      <span>버전</span>
      <span class="arrow">1.0.0</span>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <a href="index.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>기록</a>
  <a href="body.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a8 8 0 0 1 16 0v1"/></svg>키/몸무게</a>
  <a href="exercise.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5 17.5 17.5"/><path d="M21 21l-2-2"/><path d="M3 3l2 2"/><path d="M5 5l2-2"/><path d="M19 19l2-2"/><path d="M2.5 8.5l3-3"/><path d="M21.5 15.5l-3 3"/><path d="M8.5 2.5l-3 3"/><path d="M15.5 21.5l3-3"/></svg>운동기록</a>
  <a href="nutrition.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11h18a9 9 0 0 1-18 0Z"/><path d="M12 11V6"/><path d="M9 6h6"/></svg>영양/수분</a>
  <a href="settings.html" class="active"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>설정</a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDl_CNpDZk4UPHp8s-EhG83Gsr1WPLaF9g",
  authDomain: "official-mn.firebaseapp.com",
  projectId: "official-mn",
  storageBucket: "official-mn.firebasestorage.app",
  messagingSenderId: "892732440943",
  appId: "1:892732440943:web:a4db28f12e17bd7c76e89a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const API_KEY_STORAGE = "mnhealth_api_key";
const apiKeyInput = document.getElementById("apiKeyInput");
const keyStatus = document.getElementById("keyStatus");

const savedKey = localStorage.getItem(API_KEY_STORAGE);
if (savedKey) {
  apiKeyInput.value = savedKey;
  keyStatus.textContent = "API 키가 저장되어 있어요.";
}

document.getElementById("saveKeyBtn").addEventListener("click", () => {
  const key = apiKeyInput.value.trim();
  if (key) {
    localStorage.setItem(API_KEY_STORAGE, key);
    keyStatus.textContent = "API 키가 저장되었어요.";
  } else {
    localStorage.removeItem(API_KEY_STORAGE);
    keyStatus.textContent = "API 키가 삭제되었어요.";
  }
});

let currentUser = null;

onAuthStateChanged(auth, (user) => {
  if (user && user.emailVerified) {
    currentUser = user;
    document.getElementById("userEmail").textContent = user.email || "-";
  } else {
    window.location.href = "login.html";
  }
});

document.getElementById("logoutBtn").addEventListener("click", async () => {
  if (confirm("로그아웃 할까요?")) {
    await signOut(auth);
    window.location.href = "login.html";
  }
});

document.getElementById("exportBtn").addEventListener("click", async () => {
  if (!currentUser) return;
  const snap = await getDocs(collection(db, "users", currentUser.uid, "records"));
  const data = {};
  snap.forEach(d => { data[d.id] = d.data(); });
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "mnhealth_records.json";
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById("resetBtn").addEventListener("click", async () => {
  if (!currentUser) return;
  if (confirm("모든 기록을 삭제할까요? 이 작업은 되돌릴 수 없어요.")) {
    const snap = await getDocs(collection(db, "users", currentUser.uid, "records"));
    await Promise.all(snap.docs.map(d => deleteDoc(d.ref)));
    alert("모든 기록이 삭제되었어요.");
  }
});
</script>
</body>
</html>
