<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>설정 - MN Health</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif;background:#f9fafb;color:#191f28;min-height:100vh}
    header{background:#fff;border-bottom:1px solid #f2f4f6;padding:0 20px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
    header a{color:#191f28;text-decoration:none;display:flex;align-items:center}
    header h2{font-size:17px;font-weight:700}
    main{max-width:480px;margin:0 auto;padding:24px 20px 100px}
    .sec-label{font-size:12px;color:#6b7684;font-weight:500;padding:0 4px;margin:20px 0 8px}
    .sec-label:first-child{margin-top:0}
    .card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,0.06);margin-bottom:12px}
    .profile-row{display:flex;align-items:center;gap:14px;padding:8px 0}
    .p-avatar{width:52px;height:52px;border-radius:50%;background:#e8f3ff;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#3182f6;overflow:hidden;flex-shrink:0}
    .p-avatar img{width:100%;height:100%;object-fit:cover}
    .p-name{font-size:16px;font-weight:700}
    .p-email{font-size:13px;color:#6b7684;margin-top:2px}
    .s-row{display:flex;align-items:center;padding:16px 0;border-bottom:1px solid #f2f4f6;gap:14px;cursor:pointer}
    .s-row:last-child{border-bottom:none}
    .s-icon{width:36px;height:36px;background:#f2f4f6;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#3182f6;flex-shrink:0}
    .s-text{flex:1}
    .s-name{font-size:15px;font-weight:500}
    .s-desc{font-size:12px;color:#6b7684;margin-top:2px}
    .s-arrow{color:#b0b8c1;display:flex;align-items:center}
    .btn-danger{width:100%;background:none;color:#f44336;border:1.5px solid #ffd0ce;border-radius:12px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:10px}
    .app-info{text-align:center;padding:32px 0 16px}
    .app-logo{font-size:24px;font-weight:700;color:#3182f6;letter-spacing:-1px}
    .app-ver{font-size:13px;color:#b0b8c1;margin-top:4px}
    nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #f2f4f6;display:flex;height:64px;z-index:100}
    nav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;text-decoration:none;color:#b0b8c1;font-size:10px;font-weight:500}
    nav a.active{color:#3182f6}
    .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#191f28;color:#fff;padding:12px 20px;border-radius:100px;font-size:14px;font-weight:500;opacity:0;transition:all 0.25s;pointer-events:none;white-space:nowrap;z-index:200}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
<header>
  <a href="index.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></a>
  <h2>설정</h2>
</header>
<main>
  <div class="sec-label">프로필</div>
  <div class="card">
    <div class="profile-row">
      <div class="p-avatar" id="pAvatar"><span id="pInitial">?</span></div>
      <div>
        <div class="p-name" id="pName">-</div>
        <div class="p-email" id="pEmail">-</div>
      </div>
    </div>
  </div>

  <div class="sec-label">데이터</div>
  <div class="card">
    <div class="s-row" id="exportBtn">
      <div class="s-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></div>
      <div class="s-text"><div class="s-name">데이터 내보내기</div><div class="s-desc">JSON 파일로 저장</div></div>
      <div class="s-arrow"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></div>
    </div>
    <div class="s-row" onclick="location.href='privacy.html'">
      <div class="s-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
      <div class="s-text"><div class="s-name">개인정보 처리방침</div></div>
      <div class="s-arrow"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></div>
    </div>
  </div>

  <div class="sec-label">계정</div>
  <button class="btn-danger" id="btnLogout">로그아웃</button>

  <div class="app-info">
    <div class="app-logo">MN Health</div>
    <div class="app-ver">v1.0.0</div>
  </div>
</main>
<nav>
  <a href="index.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>홈</a>
  <a href="body.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>신체</a>
  <a href="exercise.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>운동</a>
  <a href="settings.html" class="active"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>설정</a>
</nav>
<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const app = initializeApp({
    apiKey:"AIzaSyBDIgsg99fxj2RFeEeFVD92mNltAweDpd8",
    authDomain:"mn-health.firebaseapp.com",
    projectId:"mn-health",
    storageBucket:"mn-health.firebasestorage.app",
    messagingSenderId:"442489563296",
    appId:"1:442489563296:web:c2a044ee36b1a1c59641c5"
  });
  const auth = getAuth(app);
  const db = getFirestore(app);

  function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }

  onAuthStateChanged(auth, user=>{
    if(!user){location.href='index.html';return;}
    if(user.photoURL) document.getElementById('pAvatar').innerHTML=`<img src="${user.photoURL}">`;
    else document.getElementById('pInitial').textContent=(user.displayName||user.email||'?')[0].toUpperCase();
    document.getElementById('pName').textContent=user.displayName||'이름 없음';
    document.getElementById('pEmail').textContent=user.email||'';

    document.getElementById('btnLogout').onclick=async()=>{
      if(!confirm('로그아웃 할까요?')) return;
      await signOut(auth); location.href='index.html';
    };

    document.getElementById('exportBtn').onclick=async()=>{
      try{
        const [bodySnap,exSnap]=await Promise.all([
          getDocs(query(collection(db,`users/${user.uid}/body_records`),orderBy('date'))),
          getDocs(query(collection(db,`users/${user.uid}/exercise_records`),orderBy('date')))
        ]);
        const data={body:bodySnap.docs.map(d=>d.data()),exercise:exSnap.docs.map(d=>d.data()),exportedAt:new Date().toISOString()};
        const a=document.createElement('a');
        a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
        a.download=`mn-health-${new Date().toISOString().slice(0,10)}.json`; a.click();
        toast('데이터를 내보냈어요');
      }catch(e){alert('내보내기에 실패했어요');}
    };
  });
</script>
</body>
</html>
