<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>설정 - MN Health</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
      background: #f9fafb;
      color: #191f28;
      min-height: 100vh;
    }
    header {
      background: #fff;
      border-bottom: 1px solid #f2f4f6;
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header a { color: #191f28; text-decoration: none; display: flex; align-items: center; }
    header h2 { font-size: 17px; font-weight: 700; }
    main { max-width: 480px; margin: 0 auto; padding: 24px 20px 100px; }

    .section-label {
      font-size: 12px;
      color: #6b7684;
      font-weight: 500;
      padding: 0 4px;
      margin: 20px 0 8px;
    }
    .section-label:first-child { margin-top: 0; }

    .card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .setting-row {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid #f2f4f6;
      gap: 14px;
    }
    .setting-row:last-child { border-bottom: none; }
    .setting-icon {
      width: 36px; height: 36px;
      background: #f2f4f6;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #3182f6;
      flex-shrink: 0;
    }
    .setting-text { flex: 1; }
    .setting-name { font-size: 15px; font-weight: 500; color: #191f28; }
    .setting-desc { font-size: 12px; color: #6b7684; margin-top: 2px; }
    .setting-value {
      font-size: 15px;
      color: #6b7684;
    }
    .setting-arrow { color: #b0b8c1; display: flex; align-items: center; }

    /* 이름 입력 카드 */
    .profile-card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .form-row { margin-bottom: 14px; }
    .form-row label { font-size: 13px; color: #6b7684; font-weight: 500; display: block; margin-bottom: 6px; }
    .form-row input, .form-row select {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid #f2f4f6;
      border-radius: 12px;
      font-size: 16px;
      color: #191f28;
      background: #f9fafb;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    .form-row input:focus, .form-row select:focus { border-color: #3182f6; background: #fff; }
    .btn-primary {
      width: 100%;
      background: #3182f6;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-primary:active { background: #1a6fe0; }

    .btn-danger {
      width: 100%;
      background: none;
      color: #f44336;
      border: 1.5px solid #ffd0ce;
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    /* 앱 정보 */
    .app-info {
      text-align: center;
      padding: 32px 0 16px;
    }
    .app-logo { font-size: 24px; font-weight: 700; color: #3182f6; letter-spacing: -1px; }
    .app-ver { font-size: 13px; color: #b0b8c1; margin-top: 4px; }
    .app-desc { font-size: 13px; color: #6b7684; margin-top: 8px; line-height: 1.5; }

    nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #fff;
      border-top: 1px solid #f2f4f6;
      display: flex;
      height: 64px;
      z-index: 100;
    }
    nav a {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      text-decoration: none;
      color: #b0b8c1;
      font-size: 10px;
      font-weight: 500;
    }
    nav a.active { color: #3182f6; }

    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #191f28;
      color: #fff;
      padding: 12px 20px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 200;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <a href="index.html">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </a>
  <h2>설정</h2>
</header>

<main>
  <!-- 프로필 -->
  <div class="section-label">프로필</div>
  <div class="profile-card">
    <div class="form-row">
      <label>이름</label>
      <input type="text" id="inputName" placeholder="이름을 입력하세요" maxlength="20" />
    </div>
    <div class="form-row">
      <label>생년월일</label>
      <input type="date" id="inputBirth" />
    </div>
    <div class="form-row">
      <label>성별</label>
      <select id="inputGender">
        <option value="">선택 안 함</option>
        <option value="male">남성</option>
        <option value="female">여성</option>
      </select>
    </div>
    <button class="btn-primary" onclick="saveProfile()">저장하기</button>
  </div>

  <!-- 목표 설정 -->
  <div class="section-label">목표</div>
  <div class="profile-card">
    <div class="form-row">
      <label>주간 운동 목표 (회)</label>
      <input type="number" id="inputGoal" placeholder="3" min="1" max="7" />
    </div>
    <div class="form-row">
      <label>목표 체중 (kg)</label>
      <input type="number" id="inputTargetWeight" placeholder="65.0" step="0.1" />
    </div>
    <button class="btn-primary" onclick="saveGoals()">저장하기</button>
  </div>

  <!-- 데이터 관리 -->
  <div class="section-label">데이터</div>
  <div class="card">
    <div class="setting-row" onclick="exportData()" style="cursor:pointer">
      <div class="setting-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </div>
      <div class="setting-text">
        <div class="setting-name">데이터 내보내기</div>
        <div class="setting-desc">JSON 파일로 저장</div>
      </div>
      <div class="setting-arrow">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- 정보 초기화 -->
  <div class="section-label">위험 구역</div>
  <div style="padding:0 0 12px;">
    <button class="btn-danger" onclick="clearAllData()">모든 데이터 초기화</button>
  </div>

  <!-- 앱 정보 -->
  <div class="app-info">
    <div class="app-logo">MN Health</div>
    <div class="app-ver">v1.0.0</div>
    <div class="app-desc">건강한 생활 습관을 위한<br>개인 건강 기록 앱</div>
  </div>

  <div style="text-align:center;padding-bottom:8px;">
    <a href="privacy.html" style="font-size:13px;color:#b0b8c1;text-decoration:none;">개인정보 처리방침</a>
  </div>
</main>

<nav>
  <a href="index.html">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    홈
  </a>
  <a href="body.html">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
    </svg>
    신체
  </a>
  <a href="exercise.html">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
    </svg>
    운동
  </a>
  <a href="settings.html" class="active">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="8" r="4"/>
      <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
    </svg>
    설정
  </a>
</nav>

<div class="toast" id="toast"></div>

<script>
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  function loadProfile() {
    document.getElementById('inputName').value = localStorage.getItem('mn_name') || '';
    document.getElementById('inputBirth').value = localStorage.getItem('mn_birth') || '';
    document.getElementById('inputGender').value = localStorage.getItem('mn_gender') || '';
    document.getElementById('inputGoal').value = localStorage.getItem('mn_goal') || '3';
    document.getElementById('inputTargetWeight').value = localStorage.getItem('mn_target_weight') || '';
  }

  function saveProfile() {
    const name = document.getElementById('inputName').value.trim();
    const birth = document.getElementById('inputBirth').value;
    const gender = document.getElementById('inputGender').value;

    if (name) localStorage.setItem('mn_name', name);
    else localStorage.removeItem('mn_name');
    if (birth) localStorage.setItem('mn_birth', birth);
    if (gender) localStorage.setItem('mn_gender', gender);

    showToast('프로필이 저장됐어요');
  }

  function saveGoals() {
    const goal = document.getElementById('inputGoal').value;
    const tw = document.getElementById('inputTargetWeight').value;
    if (goal) localStorage.setItem('mn_goal', goal);
    if (tw) localStorage.setItem('mn_target_weight', tw);
    showToast('목표가 저장됐어요');
  }

  function exportData() {
    const data = {
      profile: {
        name: localStorage.getItem('mn_name'),
        birth: localStorage.getItem('mn_birth'),
        gender: localStorage.getItem('mn_gender'),
      },
      body: JSON.parse(localStorage.getItem('mn_body_records') || '[]'),
      exercise: JSON.parse(localStorage.getItem('mn_exercise') || '[]'),
      exportedAt: new Date().toISOString(),
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `mn-health-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    showToast('데이터를 내보냈어요');
  }

  function clearAllData() {
    if (!confirm('모든 데이터를 삭제할까요? 이 작업은 되돌릴 수 없어요.')) return;
    const keys = ['mn_name','mn_birth','mn_gender','mn_weight','mn_height','mn_goal','mn_target_weight','mn_body_records','mn_exercise','mn_today_kcal'];
    keys.forEach(k => localStorage.removeItem(k));
    showToast('모든 데이터가 초기화됐어요');
    loadProfile();
  }

  loadProfile();
</script>
</body>
</html>
